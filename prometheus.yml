global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "/etc/prometheus/alert_rules.yml"

scrape_configs:
  - job_name: "api-gateway"
    static_configs:
      - targets: ["api-gateway:4000"]
    metrics_path: /metrics
    scrape_interval: 10s

  - job_name: "stt-cloud"
    static_configs:
      - targets: ["stt-cloud:4001"]
    metrics_path: /metrics
    scrape_interval: 10s

  - job_name: "nlp-service"
    static_configs:
      - targets: ["nlp-service:4002"]
    metrics_path: /metrics
    scrape_interval: 10s

  - job_name: "search-service"
    static_configs:
      - targets: ["search-service:4003"]
    metrics_path: /metrics
    scrape_interval: 10s

  - job_name: "calendar-service"
    static_configs:
      - targets: ["calendar-service:4004"]
    metrics_path: /metrics
    scrape_interval: 10s
