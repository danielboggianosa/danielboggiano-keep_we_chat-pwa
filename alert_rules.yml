groups:
  - name: service_alerts
    rules:
      - alert: HighErrorRate
        expr: >
          (rate(http_request_errors_total[5m]) / rate(http_requests_total[5m])) > 0.05
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "High error rate on {{ $labels.job }}"
          description: "Error rate is above 5% for the last 5 minutes on {{ $labels.job }} (current value: {{ $value | humanizePercentage }})"
