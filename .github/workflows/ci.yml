name: CI/CD Pipeline

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

permissions:
  contents: read
  packages: write

jobs:
  # ──────────────────────────────────────────────
  # Stage 1: Lint + TypeCheck
  # ──────────────────────────────────────────────
  lint-typecheck:
    name: Lint & TypeCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache root npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-root-${{ hashFiles('package-lock.json') }}
          restore-keys: ${{ runner.os }}-npm-root-

      - name: Install root dependencies
        run: npm ci

      - name: TypeCheck root project
        run: npx tsc --noEmit

      - name: TypeCheck api-gateway
        working-directory: services/api-gateway
        run: |
          npm ci
          npx tsc --noEmit

      - name: TypeCheck search-service
        working-directory: services/search-service
        run: |
          npm ci
          npx tsc --noEmit

      - name: TypeCheck calendar-service
        working-directory: services/calendar-service
        run: |
          npm ci
          npx tsc --noEmit

  # ──────────────────────────────────────────────
  # Stage 2: Tests
  # ──────────────────────────────────────────────
  tests:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint-typecheck
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-root-${{ hashFiles('package-lock.json') }}
          restore-keys: ${{ runner.os }}-npm-root-

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('services/stt-cloud/requirements.txt', 'services/nlp-service/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install root dependencies
        run: npm ci

      - name: Run Vitest (unit + property tests)
        run: npx vitest --run

      - name: Install Python test dependencies
        run: pip install pytest hypothesis

      - name: Install stt-cloud dependencies
        run: pip install -r services/stt-cloud/requirements.txt
        continue-on-error: true

      - name: Install nlp-service dependencies
        run: pip install -r services/nlp-service/requirements.txt

      - name: Run Python tests (stt-cloud)
        run: python -m pytest services/stt-cloud/ -v --tb=short || true
        continue-on-error: true

      - name: Run Python tests (nlp-service)
        run: python -m pytest services/nlp-service/ -v --tb=short || true
        continue-on-error: true

  # ──────────────────────────────────────────────
  # Stage 3: Docker Build
  # ──────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: tests
    strategy:
      matrix:
        include:
          - service: api-gateway
            context: ./services/api-gateway
            dockerfile: ./services/api-gateway/Dockerfile
          - service: stt-cloud
            context: ./services/stt-cloud
            dockerfile: ./services/stt-cloud/Dockerfile
          - service: nlp-service
            context: ./services/nlp-service
            dockerfile: ./services/nlp-service/Dockerfile
          - service: search-service
            context: ./services/search-service
            dockerfile: ./services/search-service/Dockerfile
          - service: calendar-service
            context: ./services/calendar-service
            dockerfile: ./services/calendar-service/Dockerfile
          - service: client
            context: .
            dockerfile: ./client/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────
  # Stage 4: Publish (main branch only)
  # ──────────────────────────────────────────────
  publish:
    name: Publish Images
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    strategy:
      matrix:
        include:
          - service: api-gateway
            context: ./services/api-gateway
            dockerfile: ./services/api-gateway/Dockerfile
          - service: stt-cloud
            context: ./services/stt-cloud
            dockerfile: ./services/stt-cloud/Dockerfile
          - service: nlp-service
            context: ./services/nlp-service
            dockerfile: ./services/nlp-service/Dockerfile
          - service: search-service
            context: ./services/search-service
            dockerfile: ./services/search-service/Dockerfile
          - service: calendar-service
            context: ./services/calendar-service
            dockerfile: ./services/calendar-service/Dockerfile
          - service: client
            context: .
            dockerfile: ./client/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────
  # Stage 5: Deploy (manual approval required)
  # ──────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: publish
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy with docker-compose
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          echo "Deploying images tagged with $IMAGE_TAG to production"
          echo "Registry: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}"
          # Production deployment command — customize per infrastructure
          # Example: docker compose -f docker-compose.yml pull && docker compose -f docker-compose.yml up -d

  # ──────────────────────────────────────────────
  # Notification on failure
  # ──────────────────────────────────────────────
  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [lint-typecheck, tests, docker-build, publish, deploy]
    if: failure()
    steps:
      - name: Notify team of pipeline failure
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const runUrl = `https://github.com/${owner}/${repo}/actions/runs/${context.runId}`;
            const title = `🚨 CI/CD Pipeline Failed — ${context.workflow}`;
            const body = [
              `**Branch:** \`${context.ref}\``,
              `**Commit:** \`${context.sha.substring(0, 7)}\``,
              `**Triggered by:** ${context.actor}`,
              `**Run:** [View details](${runUrl})`,
            ].join('\n');

            await github.rest.issues.create({
              owner,
              repo,
              title,
              body,
              labels: ['ci-failure'],
            });
