<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#FF6B6B" />
    <title>Sin conexión — KeepWeChat</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        background: #f8f9fa;
        color: #333;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 1rem;
      }
      .container {
        text-align: center;
        max-width: 480px;
      }
      .icon {
        font-size: 4rem;
        margin-bottom: 1.5rem;
      }
      h1 {
        font-size: 1.5rem;
        font-weight: 600;
        margin-bottom: 0.75rem;
        color: #222;
      }
      p {
        font-size: 1rem;
        line-height: 1.6;
        color: #666;
        margin-bottom: 1.5rem;
      }
      .retry-btn {
        display: inline-block;
        padding: 0.75rem 2rem;
        background: #FF6B6B;
        color: #fff;
        border: none;
        border-radius: 8px;
        font-size: 1rem;
        font-weight: 500;
        cursor: pointer;
        text-decoration: none;
        transition: background 0.2s;
      }
      .retry-btn:hover {
        background: #e55a5a;
      }
      .retry-btn:focus {
        outline: 2px solid #FF6B6B;
        outline-offset: 2px;
      }
      .hint {
        margin-top: 1.5rem;
        font-size: 0.875rem;
        color: #999;
      }
    </style>
  </head>
  <body>
    <main class="container" role="main">
      <div class="icon" aria-hidden="true">📡</div>
      <h1>Sin conexión</h1>
      <p>
        No se pudo cargar esta página porque no hay conexión a internet.
        Las transcripciones guardadas localmente siguen disponibles.
      </p>
      <button class="retry-btn" onclick="window.location.reload()" aria-label="Reintentar cargar la página">
        Reintentar
      </button>
      <p class="hint">La aplicación se reconectará automáticamente cuando vuelva la conexión.</p>
    </main>
  </body>
</html>
